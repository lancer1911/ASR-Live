<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f12;--bg2:#13171c;--bg3:#1a1f26;--bg4:#20262f;
  --b1:#1e2530;--b2:#28333f;
  --ac:#00c896;--acd:rgba(0,200,150,.07);
  --tx:#dde3ea;--su:#9aa8b8;--hi:#5a6e82;
  --zh:#e8b84b;--en:#5db8f0;--ja:#f07898;
  --red:#e05050;--grn:#00c896;
  --tx-strong:#f0f4f8;
  --tt-zh:#d4a020;--tt-en:#48aae0;--tt-ja:#e86888;
  --cl-zh:#e8b84b;--cl-en:#5db8f0;--cl-ja:#f07898;--cl-ko:#80d4a0;--cl-fr:#c090e0;--cl-de:#f0a050;--cl-es:#f06060;
  --r:7px;--fs:16px;
}
:root.light{
  --bg:#f0f2f5;--bg2:#ffffff;--bg3:#e8eaed;--bg4:#dde0e5;
  --b1:#d0d4da;--b2:#b8bcc4;
  --ac:#009970;--acd:rgba(0,153,112,.07);
  --tx:#1a2030;--su:#2e3a4a;--hi:#5c6878;
  --zh:#8a6200;--en:#0060a0;--ja:#c03060;
  --red:#c03030;--grn:#009970;
  --tx-strong:#0d1420;
  --tt-zh:#7a5200;--tt-en:#005090;--tt-ja:#a02050;
  --cl-zh:#8a6000;--cl-en:#0060a0;--cl-ja:#b02050;--cl-ko:#006040;--cl-fr:#7040a0;--cl-de:#c06000;--cl-es:#c02020;
}
html,body{height:100vh;overflow:hidden;font-family:-apple-system,'PingFang SC','Hiragino Sans GB',sans-serif;font-size:var(--fs);background:var(--bg);color:var(--tx)}

/* ── topbar ── */
.top{height:48px;background:var(--bg2);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;-webkit-app-region:drag}
.brand{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:14px;font-weight:500;color:var(--ac);letter-spacing:.1em;flex-shrink:0}
.brand em{color:var(--hi);font-style:normal}
.tmid{flex:1;display:flex;align-items:center;gap:8px;min-width:0}
.dot{width:7px;height:7px;border-radius:50%;background:var(--hi);flex-shrink:0;transition:all .3s}
.dot.on{background:var(--ac);box-shadow:0 0 7px var(--ac);animation:dp 1.8s infinite}
@keyframes dp{0%,100%{opacity:1}55%{opacity:.3}}
.tst{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:14px;color:var(--su);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tr{display:flex;gap:6px;flex-shrink:0;-webkit-app-region:no-drag}
.btn{padding:6px 11px;border:0.5px solid var(--b2);border-radius:5px;background:none;color:var(--su);font-size:14px;font-family:ui-monospace,'SF Mono',Menlo,monospace;cursor:pointer;transition:all .12s;white-space:nowrap}
.btn:hover{border-color:var(--ac);color:var(--ac)}
.btn.ron{border-color:var(--red)!important;color:var(--red)!important;background:rgba(224,80,80,.07)!important}
.btn.act{border-color:var(--ac);color:var(--ac);background:var(--acd)}
.btn:disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
.btn-danger{border-color:var(--red)!important;color:var(--red)!important}
.btn-danger:hover{background:rgba(224,80,80,.07)!important}
/* ── confirm modal ── */
.cfm-ov{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:600}
.cfm-box{width:360px;background:var(--bg2);border:0.5px solid var(--b2);border-radius:10px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.35)}
.cfm-body{padding:22px 22px 16px;font-size:15px;color:var(--tx);line-height:1.6}
.cfm-foot{padding:10px 16px 14px;display:flex;justify-content:flex-end;gap:8px}
.cfm-btn{padding:6px 16px;border-radius:5px;font-size:14px;cursor:pointer;font-family:-apple-system,'PingFang SC','Hiragino Sans GB',sans-serif;transition:all .12s}
.cfm-primary{border:none;background:var(--ac);color:#081a14;font-weight:500}
.cfm-primary:hover{opacity:.85}
.cfm-ghost{border:0.5px solid var(--b2);background:none;color:var(--su)}
.cfm-ghost:hover{border-color:var(--tx);color:var(--tx)}
.cfm-danger{border:0.5px solid var(--red);background:none;color:var(--red)}
.cfm-danger:hover{background:rgba(224,80,80,.09)}
/* ── status banner (已保存 / 放弃保存) ── */
.status-banner{position:fixed;top:56px;left:50%;transform:translateX(-50%);
  background:var(--bg2);border:0.5px solid var(--b2);border-radius:8px;
  padding:9px 22px;font-size:14px;color:var(--su);
  font-family:ui-monospace,'SF Mono',Menlo,monospace;
  box-shadow:0 4px 16px rgba(0,0,0,.2);z-index:700;white-space:nowrap;
  animation:sfadein .2s ease}
@keyframes sfadein{from{opacity:0;transform:translateX(-50%) translateY(-6px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.lang-toggle{padding:5px 10px;border:0.5px solid var(--b2);border-radius:5px;background:none;color:var(--su);font-size:13px;font-family:ui-monospace,'SF Mono',Menlo,monospace;cursor:pointer;transition:all .12s;letter-spacing:.06em}
.lang-toggle:hover{border-color:var(--ac);color:var(--ac)}

/* ── shell ── */
.shell{display:flex;height:calc(100vh - 48px);overflow:hidden}

/* ── sidebar ── */
.side{width:206px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--b1);display:flex;flex-direction:column;overflow-y:auto}
.side::-webkit-scrollbar{width:3px}
.side::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
.sg{padding:12px 14px 10px;border-bottom:1px solid var(--b1)}
.sg:last-child{border-bottom:none;flex:1}
.slbl{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;letter-spacing:.15em;color:var(--hi);text-transform:uppercase;margin-bottom:8px}
.rbig{width:100%;padding:10px;border-radius:var(--r);border:0.5px solid var(--b2);background:none;color:var(--su);font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:15px;letter-spacing:.05em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .15s}
.rbig:not(.on):hover{border-color:var(--ac);color:var(--ac)}
.rbig.on{border-color:var(--ac);color:var(--ac);background:var(--acd)}
.rdot{width:7px;height:7px;border-radius:50%;background:var(--hi);transition:all .2s}
.rbig.on .rdot{background:var(--ac);animation:dp .85s infinite}
.lrow{display:flex;gap:5px;flex-wrap:wrap}
.ltag{padding:5px 9px;border-radius:4px;border:0.5px solid var(--b2);background:none;font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:14px;color:var(--su);cursor:pointer;transition:all .12s;user-select:none}
.ltag:not(.on):hover{border-color:var(--ac);color:var(--ac)}
.ltag.asr-lang.on:not(.zh):not(.en):not(.ja){border-color:var(--ac);color:var(--ac);background:rgba(52,211,153,.07)}
.ltag.zh.on{border-color:var(--zh);color:var(--zh);background:rgba(232,184,75,.07)}
.ltag.en.on{border-color:var(--en);color:var(--en);background:rgba(93,184,240,.07)}
.ltag.ja.on{border-color:var(--ja);color:var(--ja);background:rgba(240,120,152,.07)}
.pr{margin-bottom:10px}
.prh{display:flex;justify-content:space-between;margin-bottom:4px;font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:14px;color:var(--su)}
.prh span{color:var(--ac)}
input[type=range]{width:100%;height:2px;-webkit-appearance:none;background:var(--b2);border-radius:1px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:var(--ac);box-shadow:0 0 4px rgba(0,200,150,.4)}
.met{display:flex;justify-content:space-between;padding:6px 0;border-bottom:0.5px solid var(--b1);font-size:15px}
.met:last-child{border-bottom:none}
.mn{color:var(--su)}
.mv{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:14px;color:var(--tx)}
.mv.g{color:var(--grn)}.mv.w{color:#e0a050}.mv.r{color:var(--red)}

/* ── center ── */
.ctr{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.wave{height:48px;background:var(--bg2);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 16px;gap:2px;position:relative;flex-shrink:0}
.wc{width:2px;border-radius:1px;background:var(--ac);opacity:.55;transition:height .07s}
.wtime{position:absolute;right:16px;font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;color:var(--su)}
.sc{flex:1;overflow-y:auto;padding:16px 18px}
.sc::-webkit-scrollbar{width:3px}
.sc::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

/* ── entry ── */
.ent{margin-bottom:12px;border-radius:var(--r);border:0.5px solid var(--b1);background:var(--bg2);overflow:hidden;animation:eu .22s ease}
.ent[data-mp3-offset]{cursor:pointer}
.ent[data-mp3-offset]:hover{border-color:rgba(0,200,150,.35);background:linear-gradient(135deg,rgba(0,200,150,.04) 0%,transparent 100%)}
@keyframes eu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.ent.zh{border-left:2.5px solid var(--zh)}
.ent.en{border-left:2.5px solid var(--en)}
.ent.ja{border-left:2.5px solid var(--ja)}
.ent.live{border:0.5px solid rgba(0,200,150,.3);border-left:2.5px solid var(--ac)}
.eHead{display:flex;align-items:center;gap:7px;padding:7px 12px 6px;border-bottom:0.5px solid var(--b1)}
.badge{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;letter-spacing:.07em;padding:2px 7px;border-radius:3px;font-weight:500}
.badge.zh{background:rgba(232,184,75,.11);color:#b8902a;border:0.5px solid rgba(232,184,75,.2)}
.badge.en{background:rgba(93,184,240,.11);color:#3a8ab5;border:0.5px solid rgba(93,184,240,.2)}
.badge.ja{background:rgba(240,120,152,.11);color:#b84d6a;border:0.5px solid rgba(240,120,152,.2)}
.ets{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;color:var(--hi)}
.elat{margin-left:auto;font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;color:var(--hi)}
.edit-btn{margin-left:6px;padding:1px 7px;font-size:12px;border-radius:3px;border:0.5px solid var(--b2);background:none;color:var(--hi);cursor:pointer;flex-shrink:0;line-height:1.6;transition:border-color .15s,color .15s}
.edit-btn:hover{border-color:var(--ac);color:var(--ac)}
.edit-btn.saving{border-color:var(--ac);color:var(--ac)}
.edit-btn-save{margin-left:6px;padding:1px 8px;font-size:12px;border-radius:3px;border:0.5px solid var(--b2);background:none;color:var(--hi);cursor:pointer;flex-shrink:0;line-height:1.6;transition:border-color .15s,color .15s}
.edit-btn-save:hover{border-color:var(--ac);color:var(--ac)}
.edit-btn-translate{margin-left:4px;padding:1px 8px;font-size:12px;border-radius:3px;border:0.5px solid rgba(52,211,153,.4);background:rgba(52,211,153,.06);color:var(--ac);cursor:pointer;flex-shrink:0;line-height:1.6;transition:border-color .15s,background .15s}
.edit-btn-translate:hover{border-color:var(--ac);background:rgba(52,211,153,.13)}
.orig{padding:10px 12px 9px;line-height:1.7;font-size:16px;font-weight:400;color:var(--tx-strong);border-bottom:0.5px solid var(--b1)}
.orig-edit{width:100%;box-sizing:border-box;padding:10px 12px 9px;line-height:1.7;font-size:16px;font-weight:400;color:var(--tx-strong);border:none;border-bottom:0.5px solid var(--b1);background:rgba(52,211,153,.04);outline:none;resize:none;font-family:inherit;display:block}
.cur{display:inline-block;width:2px;height:.88em;background:var(--ac);margin-left:2px;vertical-align:text-bottom;animation:bk .65s infinite}
@keyframes bk{0%,100%{opacity:1}50%{opacity:0}}
.tblock{padding:8px 12px}
.trow{display:flex;gap:8px;align-items:baseline;margin-bottom:4px}
.trow:last-child{margin-bottom:0}
.tlbl{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;min-width:24px;flex-shrink:0;margin-top:1px}
.tt{font-size:14px;line-height:1.6;color:var(--su)}
.tt.en{color:var(--tt-en)}.tt.ja{color:var(--tt-ja);font-family:'Hiragino Sans','Yu Gothic',sans-serif}.tt.zh{color:var(--tt-zh)}

.empty{text-align:center;padding:60px 20px;font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:14px;color:var(--hi);line-height:2.2}
.toast{position:fixed;bottom:64px;left:50%;transform:translateX(-50%) translateY(10px);
  background:var(--bg2);border:0.5px solid var(--ac);border-radius:8px;
  padding:10px 18px;font-size:15px;color:var(--ac);
  font-family:ui-monospace,'SF Mono',Menlo,monospace;
  opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.hl{background:rgba(255,210,0,.35);border-radius:2px;padding:0 1px;color:inherit}
:root.light .hl{background:rgba(255,160,0,.3)}
.sw-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.sw-label{font-size:15px;font-weight:500;color:var(--su)}
.sw{position:relative;width:40px;height:22px;flex-shrink:0}
.sw input{opacity:0;width:0;height:0;position:absolute}
.sw-track{position:absolute;inset:0;border-radius:11px;background:var(--b2);transition:background .2s;cursor:pointer}
.sw input:checked+.sw-track{background:var(--ac)}
.sw-track::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.sw input:checked+.sw-track::after{transform:translateX(18px)}
.sw-sm{width:32px;height:18px}
.sw-sm .sw-track{border-radius:9px}
.sw-sm .sw-track::after{width:12px;height:12px;top:3px;left:3px}
.sw-sm input:checked+.sw-track::after{transform:translateX(14px)}

/* ── mp3 player bar ── */
.pbar{height:52px;background:var(--bg2);border-top:1px solid var(--b1);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;transition:all .3s}
.pbar.hidden{display:none}
.pbar-merge{flex:1;display:flex;align-items:center;gap:10px;font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:14px;color:var(--su)}
.pbar-merge .spin{animation:sp .9s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}
.pbar-player{flex:1;display:flex;align-items:center;gap:8px}
.pbar-play{width:30px;height:30px;border-radius:50%;border:0.5px solid var(--b2);background:none;color:var(--ac);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0}
.pbar-play:hover{border-color:var(--ac);background:var(--acd)}
.pbar-seek{flex:1;height:3px;-webkit-appearance:none;background:var(--b2);border-radius:2px;outline:none;cursor:pointer;position:relative}
.pbar-seek::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:var(--ac);box-shadow:0 0 5px rgba(0,200,150,.5)}
.pbar-time{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;color:var(--su);white-space:nowrap;min-width:88px;text-align:right}
.pbar-follow{display:flex;align-items:center;gap:6px;font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;color:var(--su);white-space:nowrap;flex-shrink:0}
.ent.playing{
  border-color:var(--ac)!important;
  background:linear-gradient(135deg, rgba(0,200,150,.06) 0%, rgba(0,200,150,.02) 100%)!important;
  box-shadow:0 0 0 1px rgba(0,200,150,.18), 0 2px 12px rgba(0,200,150,.08)!important;
}
.ent.playing .orig{ color:var(--tx-strong) }

/* ── volume ── */
.vol-wrap{display:flex;align-items:center;gap:0;flex-shrink:0}
.vol-btn{width:30px;height:30px;border-radius:50%;border:0.5px solid var(--b2);background:none;color:var(--ac);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;transition:all .12s}
.vol-btn:hover{border-color:var(--ac);background:var(--acd)}
.vol-slider-wrap{width:0;overflow:visible;transition:width .2s ease;display:flex;align-items:center;}
.vol-wrap:hover .vol-slider-wrap,.vol-wrap:focus-within .vol-slider-wrap{width:80px}
.vol-range{width:66px;margin:0 5px;height:3px;-webkit-appearance:none;appearance:none;background:linear-gradient(to right, var(--ac) 100%, var(--b2) 100%);border-radius:2px;outline:none;cursor:pointer;}
.vol-range::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:var(--ac);box-shadow:0 0 4px rgba(0,200,150,.4);opacity:0;transition:opacity .15s;}
.vol-wrap:hover .vol-range::-webkit-slider-thumb,.vol-wrap:focus-within .vol-range::-webkit-slider-thumb{opacity:1}

.ibar{height:46px;background:var(--bg2);border-top:1px solid var(--b1);display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0}
.ibar input{flex:1;background:var(--bg3);border:0.5px solid var(--b2);border-radius:5px;padding:6px 10px;color:var(--tx);font-family:-apple-system,'PingFang SC','Hiragino Sans GB',sans-serif;font-size:16px;outline:none}
.ibar input:focus{border-color:rgba(0,200,150,.3)}
.ibar input::placeholder{color:var(--hi)}
.ib{padding:6px 10px;border:0.5px solid var(--b2);border-radius:5px;background:none;color:var(--su);font-size:15px;font-family:ui-monospace,'SF Mono',Menlo,monospace;cursor:pointer;transition:all .12s;white-space:nowrap}
.ib:hover{border-color:var(--ac);color:var(--ac)}

/* ── settings overlay ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:200}
.sp{width:540px;max-height:88vh;background:var(--bg2);border:0.5px solid var(--b2);border-radius:10px;display:flex;flex-direction:column;overflow:hidden}
.sph{padding:14px 18px;border-bottom:0.5px solid var(--b1);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.spt{font-weight:500;font-size:16px;color:var(--tx)}
.scl{width:24px;height:24px;border-radius:5px;border:0.5px solid var(--b2);background:none;color:var(--su);cursor:pointer;font-size:16px;line-height:24px;text-align:center;transition:all .12s}
.scl:hover{border-color:var(--red);color:var(--red)}
.spb{padding:16px 18px;overflow-y:auto;display:grid;grid-template-columns:1fr 1fr;gap:14px}
.spb::-webkit-scrollbar{width:3px}
.spb::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
.sf{display:flex;flex-direction:column;gap:5px}
.sf.full{grid-column:1/-1}
.sfl{font-size:15px;font-weight:500;color:var(--su)}
.sfl small{font-weight:400;color:var(--hi);font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:12px;margin-left:4px}
select,.si{width:100%;padding:7px 10px;background:var(--bg3);border:0.5px solid var(--b2);border-radius:5px;color:var(--tx);font-size:16px;outline:none;-webkit-appearance:none;font-family:-apple-system,'PingFang SC','Hiragino Sans GB',sans-serif}
select:focus,.si:focus{border-color:rgba(0,200,150,.35)}
.ssr{display:flex;align-items:center;gap:8px}
.ssr input{flex:1;height:2px}
.ssc{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;color:var(--ac);min-width:34px;text-align:right}
.ssect{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--hi);grid-column:1/-1;padding-top:4px;border-top:0.5px solid var(--b1);margin-top:2px}
.togs{display:flex;gap:6px;flex-wrap:wrap}
.tog{padding:6px 11px;border-radius:4px;border:0.5px solid var(--b2);background:none;font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:14px;color:var(--su);cursor:pointer;transition:all .12s;user-select:none}
.tog.on{border-color:var(--ac);color:var(--ac);background:var(--acd)}
.hint{font-size:12px;color:var(--hi);margin-top:2px;line-height:1.5}
.spf{padding:12px 18px;border-top:0.5px solid var(--b1);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}
.bsave{padding:7px 18px;border-radius:5px;border:none;background:var(--ac);color:#081a14;font-size:14px;font-weight:500;cursor:pointer;font-family:-apple-system,'PingFang SC','Hiragino Sans GB',sans-serif}
.bsave:hover{opacity:.85}
.bcan{padding:7px 14px;border-radius:5px;border:0.5px solid var(--b2);background:none;color:var(--su);font-size:14px;cursor:pointer;font-family:-apple-system,'PingFang SC','Hiragino Sans GB',sans-serif;transition:all .12s}
.bcan:hover{color:var(--tx);border-color:var(--tx)}

/* ── download guide ── */
.dl-overlay{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;align-items:center;justify-content:center;flex-direction:column}
.dl-box{width:520px;background:var(--bg2);border:0.5px solid var(--b2);border-radius:12px;overflow:hidden}
.dl-head{padding:24px 28px 16px;border-bottom:0.5px solid var(--b1)}
.dl-title{font-size:20px;font-weight:500;color:var(--tx);margin-bottom:6px}
.dl-sub{font-size:15px;color:var(--su);line-height:1.6}
.dl-body{padding:20px 28px;display:flex;flex-direction:column;gap:14px}
.dl-model{background:var(--bg3);border:0.5px solid var(--b1);border-radius:8px;padding:14px 16px}
.dl-model-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.dl-model-name{font-size:16px;font-weight:500;color:var(--tx)}
.dl-model-size{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;color:var(--su)}
.dl-model-desc{font-size:14px;color:var(--su);margin-bottom:10px}
.dl-status{font-family:ui-monospace,'SF Mono',Menlo,monospace;font-size:13px;padding:4px 0;color:var(--hi);min-height:18px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dl-status.ok{color:var(--ac)}
.dl-status.err{color:var(--red)}
.dl-progress{height:3px;background:var(--b1);border-radius:2px;margin-top:8px;overflow:hidden;display:none}
.dl-progress-bar{height:100%;background:var(--ac);border-radius:2px;width:0%;transition:width .3s}
.dl-cached{display:flex;align-items:center;gap:6px;font-size:14px;color:var(--ac);font-weight:500}
.dl-foot{padding:16px 28px;border-top:0.5px solid var(--b1);display:flex;gap:10px;justify-content:flex-end}
.dl-btn{padding:9px 20px;border-radius:6px;border:none;font-size:15px;cursor:pointer;font-family:-apple-system,'PingFang SC',sans-serif;font-weight:500}
.dl-btn-primary{background:var(--ac);color:#081a14}
.dl-btn-primary:hover{opacity:.85}
.dl-btn-primary:disabled{opacity:.4;cursor:not-allowed}
.dl-btn-skip{background:none;border:0.5px solid var(--b2);color:var(--su)}
.dl-btn-skip:hover{color:var(--tx);border-color:var(--tx)}
</style>
</head>
<body>

<div class="dl-overlay" id="DL_OVERLAY" style="display:none"></div>

<!-- topbar -->
<div class="top">
  <div class="brand">ASR<em>/</em>LIVE <span style="font-size:10px;color:var(--hi);letter-spacing:.05em">v4.2j</span></div>
  <div class="tmid">
    <div class="dot" id="DOT"></div>
    <span class="tst" id="TST"></span>
  </div>
  <div class="tr">
    <button class="btn" id="RBT" onclick="toggleRec()"></button>
    <button class="btn" id="RPAUSE" onclick="togglePause()" style="display:none"></button>
    <button class="btn ron" id="RSTOP" onclick="stopRec()" style="display:none"></button>
    <button class="btn" id="EXPORTBTN" onclick="doExportDialog()"></button>
    <button class="btn" id="SAVESESSIONBTN" onclick="saveSession()" title="Save session (.asr)"></button>
    <button class="btn" id="LOADSESSIONBTN" onclick="loadSessionPick()" title="Load session (.asr)"></button>
    <button class="btn btn-danger" id="CLEARBTN" onclick="clearAll()"></button>
    <input type="file" id="SESSION_FILE_INPUT" accept=".asr" style="display:none" onchange="loadSessionFile(this)">
    <input type="file" id="MP3_FILE_INPUT" accept=".mp3" style="display:none" onchange="loadMp3File(this)">
    <button class="btn" id="THMBTN" onclick="toggleTheme()" style="display:inline-flex;align-items:center;justify-content:center;padding:6px 8px"></button>
    <button class="lang-toggle" id="LANGBTN" onclick="toggleUILang()"></button>
    <button class="btn act" id="SETTINGSBTN" onclick="openSettings()"></button>
  </div>
</div>

<div class="shell">

  <!-- sidebar -->
  <div class="side">
    <div class="sg">
      <div class="slbl" id="S_REC_CTRL"></div>
      <button class="rbig" id="SRB" onclick="toggleRec()">
        <div class="rdot"></div><span id="SRL"></span>
      </button>
      <div id="SREC_CTRL" style="display:none;gap:5px;margin-top:6px;display:none">
        <button class="rbig" id="SPAUSE" onclick="togglePause()" style="font-size:14px;padding:7px">
          <span id="SPRL"></span>
        </button>
        <button class="rbig" onclick="stopRec()" id="SSTOP" style="font-size:14px;padding:7px;border-color:var(--red);color:var(--red)"></button>
      </div>
    </div>
    <div class="sg">
      <div class="slbl" id="S_LANG_LABEL"></div>
      <div class="lrow">
        <div class="ltag asr-lang on"  id="TAG_AUTO" data-asr-lang=""   onclick="setAsrLang(this)"></div>
        <div class="ltag zh asr-lang"  id="TAG_ZH"   data-asr-lang="zh" onclick="setAsrLang(this)"></div>
        <div class="ltag en asr-lang"  id="TAG_EN"   data-asr-lang="en" onclick="setAsrLang(this)"></div>
        <div class="ltag ja asr-lang"  id="TAG_JA"   data-asr-lang="ja" onclick="setAsrLang(this)"></div>
      </div>
    </div>
    <div class="sg">
      <div class="slbl" id="S_QUICK_ADJ"></div>
      <div class="pr">
        <div class="prh"><span id="SL_SILENCE_LBL"></span> <span id="SV">0.6s</span></div>
        <input type="range" min="2" max="20" value="6" step="1"
          id="SLIDER_SILENCE" oninput="SV.textContent=(+this.value/10).toFixed(1)+'s';queueSettings({silence_s:+this.value/10})">
      </div>
      <div class="pr">

<script>
// ── i18n ────────────────────────────────────────────────────
let _uiLang = localStorage.getItem('asrlive_uilang') || 'zh';
function T(key){ return (I18N[_uiLang]||I18N.zh)[key] ?? key; }
function TL(key){ return T('langName')[key] || key; } // language display name

function applyUILang(){
  const t = I18N[_uiLang];
  document.documentElement.lang = t.htmlLang;

  // toggle button
  _el('LANGBTN').textContent = t.langBtnLabel;

  // topbar
  _el('RBT').textContent      = t.btnStart;
  _el('EXPORTBTN').textContent = t.btnExport;
  _el('CLEARBTN').textContent       = t.btnClear;
  _el('SAVESESSIONBTN').textContent = t.btnSaveSession;
  _el('LOADSESSIONBTN').textContent = t.btnLoadSession;
  _el('THMBTN').title          = t.btnThemeTitle;
  _el('SETTINGSBTN').textContent = t.btnSettings;
  _el('RSTOP').textContent = t.btnStop;
  // RPAUSE / RSTOP text depend on state — handled in _applyRecUI

  // sidebar labels
  _el('S_REC_CTRL').textContent = t.sideRecControl;
  _el('S_LANG_LABEL').textContent = t.sideLangLabel;
  _el('S_QUICK_ADJ').textContent  = t.sideQuickAdj;
  _el('S_METRICS').textContent    = t.sideMetrics;
  _el('SL_SILENCE_LBL').textContent = t.sliderSilence;
  _el('SL_VAD_LBL').textContent     = t.sliderVAD;
  _el('SL_GAIN_LBL').textContent    = t.sliderGain;
  _el('M_ASR').textContent  = t.metASR;
  _el('M_LLM').textContent  = t.metLLM;
  _el('M_TOT').textContent  = t.metTotal;
  _el('M_SENT').textContent = t.metSent;
  _el('M_CHAR').textContent = t.metChar;
  _el('M_RUN').textContent  = t.metRuntime;

  // sidebar language tags
  _el('TAG_AUTO').textContent = t.langAuto || '自动';
  _el('TAG_ZH').textContent = t.langZH;
  _el('TAG_EN').textContent = t.langEN;
  _el('TAG_JA').textContent = t.langJA;

  // sidebar record button
  _el('SSTOP').textContent = t.sideStop;
  _applyRecUI(); // also updates SRL / SPRL / RPAUSE / RSTOP

  // empty hint
  const hint = _el('HINT'); if(hint) hint.innerHTML = t.emptyHint;

  // player bar
  _el('FOLLOW_LBL').textContent = t.followLabel;
  _el('VOL_BTN').title          = t.volTitle;
  const pmt = _el('PBAR_MERGE_TXT');
  if(pmt) pmt.textContent = t.merging;

  // search bar
  const sb = _el('SB'); if(sb) sb.placeholder = t.searchPlaceholder;
  const sbClr = _el('SBCLR'); if(sbClr) sbClr.title = t.searchClearTitle;
  _el('LATESTBTN').textContent = t.btnLatest;

  // settings panel
  _el('SP_TITLE').textContent       = t.settingsTitle;
  _el('SP_CANCEL').textContent      = t.btnCancel;
  _el('SP_SAVE').textContent        = t.btnSave;
  _el('SP_SECT_ASR').textContent    = t.sectASR;
  _el('SP_WHISPER_LBL').innerHTML   = t.labelWhisper + `<small>${t.whisperHint}</small>`;
  _el('SP_LLM_LBL').innerHTML       = t.labelLLM + `<small>${t.llmHint}</small>`;
  _el('SP_SECT_SCENE').textContent  = t.sectScene;
  _el('SP_CONTEXT_LBL').innerHTML   = t.labelContext + `<small>${t.contextHint}</small>`;
  _el('SP_CONTEXT_DESC').textContent = t.contextDesc;
  const scp = _el('SCP'); if(scp) scp.placeholder = t.contextPlaceholder;
  _el('SP_SECT_TRANS').textContent  = t.sectTranslate;
  _el('SP_OUTLANG_LBL').innerHTML   = t.labelOutputLangs + `<small>${t.outputLangsHint}</small>`;
  _el('SP_TRANS_DESC').textContent  = t.transDesc;
  _el('SP_SECT_VAD').textContent    = t.sectVAD;
  _el('SP_SILENCE_LBL').textContent = t.labelSilence;
  _el('SP_VAD_LBL').textContent     = t.labelVADSens;
  _el('SP_MAXSENT_LBL').textContent = t.labelMaxSent;
  _el('SP_CTXSENT_LBL').textContent = t.labelCtxSent;
  _el('SP_SECT_AUDIO').textContent  = t.sectAudio;
  _el('SP_RECSAVE_LBL').textContent = t.labelRecSave;
  _el('SP_RECSAVE_HINT').textContent = t.recSaveHint;
  _el('SP_BITRATE_LBL').innerHTML   = t.labelBitrate + `<small>${t.bitrateHint}</small>`;
  _el('OPT_BR64').textContent  = t.bitrate64;
  _el('OPT_BR128').textContent = t.bitrate128;
  _el('OPT_BR192').textContent = t.bitrate192;
  _el('OPT_BR320').textContent = t.bitrate320;
  _el('SP_MIC_LBL').textContent     = t.labelMic;
  _el('RDEVBTN').title              = t.micReloadTitle;
  _el('SP_SECT_UI').textContent     = t.sectUI;
  _el('SP_FONTSIZE_LBL').textContent = t.labelFontSize;
  _el('OPT_FS13').textContent = t.fontSmall;
  _el('OPT_FS15').textContent = t.fontMedium;
  _el('OPT_FS17').textContent = t.fontLarge;
  _el('OPT_FS20').textContent = t.fontXL;
  _el('SP_AUTOSCROLL_LBL').textContent = t.labelAutoScroll;
  _el('OPT_AS1').textContent = t.autoScrollOn;
  _el('OPT_AS0').textContent = t.autoScrollOff;

  // translation target toggles
  document.querySelectorAll('#TLOGS .tog[data-lang-key]').forEach(el => {
    el.textContent = t[el.dataset.langKey] || el.dataset.langKey;
  });

  // export dialog
  _el('EV_TITLE').textContent    = t.exportTitle;
  _el('EV_LANG_LBL').textContent = t.exportLangLabel;
  _el('EV_OPT_ALL').textContent  = t.exportAll;
  _el('EV_OPT_CORR').textContent = t.exportCorrected;
  _el('EV_OPT_RAW').textContent  = t.exportRaw;
  _el('EV_FMT_LBL').textContent  = t.exportFormatLabel;
  _el('EV_TXT').textContent      = t.exportTxt;
  _el('EV_SRT').textContent      = t.exportSrt;
  _el('EV_JSON').textContent     = t.exportJson;
  _el('EV_MD').textContent       = t.exportMd;

  // status bar (only update known idle strings)
  const tst = _el('TST');
  if(tst && (recState==='idle'||recState==='ready')) tst.textContent = t.statusReady;
  if(tst && recState==='idle' && tst.textContent==='') tst.textContent = t.statusConnecting;

  // 更新已有字幕卡片上的编辑/保存/翻译按钮文字
  document.querySelectorAll('.ent .edit-btn').forEach(btn => {
    btn.textContent = t.btnEditOrig;
    btn.title       = t.titleEditOrig;
  });
  document.querySelectorAll('.ent .edit-btn-save').forEach(btn => {
    btn.textContent = t.btnSaveOrig;
  });
  document.querySelectorAll('.ent .edit-btn-translate').forEach(btn => {
    btn.textContent = t.btnTranslateOrig;
  });
}

// ── ASR 识别语言锁定 ──────────────────────────────────────────
// lang: "" = 自动检测, "zh"/"en"/"ja" = 锁定该语言
function setAsrLang(el) {
  const lang = el.dataset.asrLang || null;
  // 单选：取消其他按钮的 on 状态
  document.querySelectorAll('.asr-lang').forEach(t => t.classList.remove('on'));
  el.classList.add('on');
  // 发送给后端
  send({ action: 'update_settings', settings: { asr_language: lang || null } });
}

function applyAsrLangUI(lang) {
  // 根据 settings.asr_language 恢复按钮选中态
  document.querySelectorAll('.asr-lang').forEach(t => t.classList.remove('on'));
  const active = lang
    ? document.querySelector(`.asr-lang[data-asr-lang="${lang}"]`)
    : _el('TAG_AUTO');
  if (active) active.classList.add('on');
}

function toggleUILang(){
  _uiLang = _uiLang === 'zh' ? 'en' : 'zh';
  localStorage.setItem('asrlive_uilang', _uiLang);
  applyUILang();
}

function _el(id){ return document.getElementById(id); }

// ── WebSocket ──────────────────────────────────────────────
let ws, recSec=0, recTi, sentCnt=0, charCnt=0, autoScroll=true;
const G = {};

// states: 'idle' | 'recording' | 'paused' | 'merging' | 'ready'
let recState = 'idle';
let _modelReady = false;  // true only after server sends {ready:true}

// Wall-clock ms at the moment the user clicked Start.
// Used to compute subtitle offset relative to MP3 start.
let _recStartWallMs = null;

let _toastTimer;
function showToast(msg){
  let t = _el('TOAST');
  if(!t){ t=document.createElement('div'); t.id='TOAST'; t.className='toast'; document.body.appendChild(t); }
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(()=>t.classList.remove('show'), 4000);
}

// ── Theme SVG icons ───────────────────────────────────────────
const ICON_MOON = `<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z" fill="white"/></svg>`;
const ICON_SUN  = `<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5" fill="white"/><line x1="12" y1="1" x2="12" y2="3" stroke-width="2.8"/><line x1="12" y1="21" x2="12" y2="23" stroke-width="2.8"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64" stroke-width="2.8"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78" stroke-width="2.8"/><line x1="1" y1="12" x2="3" y2="12" stroke-width="2.8"/><line x1="21" y1="12" x2="23" y2="12" stroke-width="2.8"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36" stroke-width="2.8"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22" stroke-width="2.8"/></svg>`;

function _setThemeIcon(isLight){
  const b = _el('THMBTN');
  if(!b) return;
  b.innerHTML = isLight ? ICON_MOON : ICON_SUN;
  // light mode: moon icon on dark-grey bg; dark mode: sun icon on light-grey bg
  if(isLight){
    b.style.background   = '#3a3f47';
    b.style.borderColor  = '#3a3f47';
    b.style.color        = '#c8cdd5';
  } else {
    b.style.background   = '#d0d4da';
    b.style.borderColor  = '#d0d4da';
    b.style.color        = '#ffffff';
  }
}

function connect(){
  ws = new WebSocket(`ws://${location.host}/ws`);
  ws.onopen  = () => { _el('MRT').textContent = T('statusConnected'); };
  ws.onclose = () => { _el('MRT').textContent = T('statusReconnecting'); setTimeout(connect, 2000); };
  ws.onmessage = e => handle(JSON.parse(e.data));
}
function send(o){ if(ws&&ws.readyState===1) ws.send(JSON.stringify(o)); }

function handle(m){
  if(m.type==='init'){
    G.settings = m.settings||{};
    applySettings(m.settings||{});
    applyAsrLangUI((m.settings||{}).asr_language || null);
    if(m.recording) setRec(true);
    (m.history||[]).forEach(addEntry);
  }
  else if(m.type==='status'){
    TST.textContent = m.text;
    if(m.ready){
      DOT.classList.add('on');
      _modelReady = true;
      _applyRecUI();
    }
  }
  else if(m.type==='recording') setRec(m.value, m);
  else if(m.type==='asr_partial') showLive(m.raw, m.lang, m.asr_ms);
  else if(m.type==='entry'){ removeLive(); addEntry(m); updateMetrics(m.asr_ms, m.llm_ms); }
  else if(m.type==='entry_updated'){ applyEntryUpdate(m); }
  else if(m.type==='cleared'){
    SC.innerHTML = `<div class="empty" id="HINT">${T('emptyHint')}</div>`;
    sentCnt=0; charCnt=0; MC.textContent='0'; MCH.textContent='0';
    if(_audio){ _audio.pause(); _audio=null; }
    _activeEntry=null; _entryTimes=[];
    _recStartWallMs = null;   // 加载会话时清除旧录音基准，避免 fallback 偏移算错
    const pb=_el('PBAR'); if(pb) pb.classList.add('hidden');
    const pp=_el('PBAR_PLAYER'), pm=_el('PBAR_MERGE');
    if(pp) pp.style.display='none';
    if(pm) pm.style.display='none';
    const seek=_el('PBAR_SEEK'); if(seek) seek.value=0;
    const timeEl=_el('PBAR_TIME'); if(timeEl) timeEl.textContent='0:00 / 0:00';
    const btn=_el('PBAR_BTN'); if(btn) btn.textContent='▶';
  }
  else if(m.type==='export') dlFile(m.content, m.format);
  else if(m.type==='session_loaded'){
    _markSaved();
    const label = typeof T('sessionLoadOk') === 'function'
      ? T('sessionLoadOk')(m.count) : T('sessionLoadOk');
    TST.textContent = label;
    // MP3 处理：后端已判断文件是否存在
    // 若文件存在，后端会广播 rec_saved，播放条自动加载
    // 若文件不存在但 .asr 中有 mp3_filename，提示用户手动选择
    if(m.mp3 && !m.mp3_found){
      // 文件曾记录但当前不可访问，显示 toast + 播放条提示按钮
      showToast(T('sessionMp3Missing'));
      _showMp3MissingBar(m.mp3.split('/').pop());
    } else if(!m.mp3){
      // 会话本来就没有录音，不提示
    }
    // mp3_found 为 true 时 rec_saved 已处理，不重复提示
  }
  else if(m.type==='settings'){ G.settings=m.settings; applySettings(m.settings); applyAsrLangUI(m.settings.asr_language||null); }
  else if(m.type==='save_done'){
    showToast(T('toastSaved').replace('{name}', m.path.split('/').pop()));
    _markSaved();
    window.dispatchEvent(new Event('_save_done'));
  }
  else if(m.type==='save_cancelled'){}
  else if(m.type.startsWith('dl_')) handleDlMsg(m);
  else if(m.type==='rec_saved'){
    const name = m.path.split('/').pop();
    const size = m.size_mb ? ` (${m.size_mb}MB)` : '';
    showToast(T('toastRecSaved').replace('{name}', name).replace('{size}', size));
    playerLoad('/rec_file?path='+encodeURIComponent(m.path));
  }
  else if(m.type==='rec_segment'){
    _el('PBAR_MERGE_TXT').textContent = T('mergingSegment').replace('{n}', m.index+1);
  }
}

// ── Recording state ────────────────────────────────────────
function setRec(on, meta){
  if(on){
    recState='recording';
    // Server's rec_start_time is more accurate than frontend click time
    // (avoids WebSocket round-trip skew). Only update on actual start.
    if(meta && meta.rec_start_time && recState !== 'paused'){
      _recStartWallMs = meta.rec_start_time * 1000; // server sends epoch seconds
    }
  } else {
    if(recState==='recording') recState='idle';
  }
  _applyRecUI();
}

function _applyRecUI(){
  const isRec  = recState === 'recording';
  const isPaus = recState === 'paused';
  const isIdle = recState === 'idle' || recState === 'merging' || recState === 'ready';

  _el('RBT').style.display    = isIdle ? '' : 'none';
  _el('RPAUSE').style.display = (isRec||isPaus) ? '' : 'none';
  _el('RSTOP').style.display  = (isRec||isPaus) ? '' : 'none';
  _el('RPAUSE').textContent   = isPaus ? T('btnResume') : T('btnPause');
  _el('RPAUSE').className     = isPaus ? 'btn act' : 'btn';
  _el('RSTOP').textContent    = T('btnStop');

  _el('SRB').style.display = isIdle ? '' : 'none';
  const ctrl = _el('SREC_CTRL');
  if(ctrl) ctrl.style.display = (isRec||isPaus) ? 'flex' : 'none';
  const sprl = _el('SPRL');
  if(sprl) sprl.textContent = isPaus ? T('sideResume') : T('sidePause');

  _el('SRB').className   = 'rbig' + (isRec?' on':'');
  _el('SRL').textContent = isRec ? T('recRunning') : isPaus ? T('recPaused') : T('recStart');
  _el('DOT').className   = 'dot' + (isRec?' on':'');

  // Disable start button until model is ready
  const notReady = !_modelReady && isIdle && recState !== 'ready';
  _el('RBT').disabled = notReady;
  _el('RBT').style.opacity = notReady ? '0.35' : '';
  const srb = _el('SRB');
  if(srb){ srb.disabled = notReady; srb.style.opacity = notReady ? '0.35' : ''; }

  // Disable settings button and quick-adjust sliders while recording or paused
  const settBtn = _el('SETTINGSBTN');
  if(settBtn){
    settBtn.disabled = isRec || isPaus;
    settBtn.title = (isRec||isPaus) ? T('settingsDisabled') : '';
  }
  const busy = isRec || isPaus;
  ['SLIDER_SILENCE','SLIDER_VAD','SLIDER_GAIN'].forEach(id=>{
    const sl = _el(id); if(!sl) return;
    sl.disabled = busy;
    sl.style.opacity = busy ? '0.35' : '';
    sl.style.cursor  = busy ? 'not-allowed' : '';
  });

  // 录音中或暂停时禁用识别语言切换
  document.querySelectorAll('.asr-lang').forEach(btn => {
    btn.style.opacity    = busy ? '0.35' : '';
    btn.style.cursor     = busy ? 'not-allowed' : '';
    btn.style.pointerEvents = busy ? 'none' : '';
  });

  const wn = (G.settings&&G.settings.whisper_repo||'whisper').split('/').pop();
  const ln = (G.settings&&G.settings.llm_repo||'llm').split('/').pop();
  _el('TST').textContent = isRec
    ? T('statusRecording').replace('{whisper}',wn).replace('{llm}',ln)
    : isPaus ? T('statusPaused') : T('statusReady');

  if(isRec && recState!=='paused'){
    if(!recTi){
      recTi=setInterval(()=>{
        recSec++;
        const h=String(Math.floor(recSec/3600)).padStart(2,'0'),
              mi=String(Math.floor((recSec%3600)/60)).padStart(2,'0'),
              s=String(recSec%60).padStart(2,'0');
        _el('WT').textContent=`${h}:${mi}:${s}`;
        _el('MRT').textContent=`${h}:${mi}:${s}`;
      },1000);
    }
    waveOn=true; waveLoop();
  } else if(isPaus){
    clearInterval(recTi); recTi=null; waveOn=false;
  } else if(isIdle){
    clearInterval(recTi); recTi=null; waveOn=false;
  }
}

// ── 自定义 confirm modal ─────────────────────────────────────
// buttons: [{label, cls, value}, ...]  → returns Promise<value>
function showModal(title, body, buttons){
  return new Promise(resolve => {
    const ov = document.createElement('div');
    ov.className = 'cfm-ov';
    const btnsHtml = buttons.map((b,i)=>
      `<button class="cfm-btn ${b.cls}" data-idx="${i}">${b.label}</button>`
    ).join('');
    ov.innerHTML = `<div class="cfm-box">
      <div class="cfm-body"><strong style="display:block;margin-bottom:6px;font-size:15px;color:var(--tx)">${title}</strong>${body}</div>
      <div class="cfm-foot">${btnsHtml}</div>
    </div>`;
    document.body.appendChild(ov);
    ov.querySelectorAll('.cfm-btn').forEach(btn => {
      btn.addEventListener('click', ()=>{
        const val = buttons[parseInt(btn.dataset.idx)].value;
        ov.remove();
        resolve(val);
      });
    });
  });
}

// ── 检查未保存，若需要则弹窗；返回 'saved'|'discard'|'cancel' ──
async function checkUnsaved(){
  if(!_unsaved) return 'discard'; // 无未保存内容，直接继续
  const choice = await showModal(
    T('cfmTitle'), T('cfmBody'),
    [
      {label: T('cfmCancel'),  cls: 'cfm-ghost',   value: 'cancel'},
      {label: T('cfmDiscard'), cls: 'cfm-danger',  value: 'discard'},
      {label: T('cfmSave'),    cls: 'cfm-primary', value: 'save'},
    ]
  );
  if(choice === 'save'){
    // 触发保存并等待 save_done（最多 15s）
    saveSession();
    await new Promise(res => {
      const tid = setTimeout(()=>{ window.removeEventListener('_save_done', h); res(); }, 15000);
      function h(){ clearTimeout(tid); window.removeEventListener('_save_done', h); res(); }
      window.addEventListener('_save_done', h, {once:true});
    });
    showBanner(T('bannerSaved'));
    _markSaved();
    await new Promise(r=>setTimeout(r,2000));
    return 'saved';
  } else if(choice === 'discard'){
    showBanner(T('bannerDiscarded'));
    await new Promise(r=>setTimeout(r,2000));
    return 'discard';
  }
  return 'cancel';
}

/**
 * Build entry→audio offset table.
 *
 * Each subtitle entry's `.ets` now contains the wall-clock HH:MM:SS of the
 * moment the spoken sentence *started* inside the recording (computed on the
 * server from the exact frame count, not from when LLM finished).
 *
 * `_recStartWallMs` is Date.now() captured the instant the user clicked Start.
 *
 * Offset = (entry_wall_seconds_since_midnight) − (recStart_seconds_since_midnight)
 *
 * Because both values come from the same clock source (server local time for
 * the entry, browser local time for recStart — they are the same machine),
 * the subtraction gives the sentence's true position inside the MP3.
 */
function _buildEntryTimes(){
  _entryTimes = [];

  // Fallback base: only used for entries that lack mp3_offset_s
  // When _recStartWallMs is null (e.g. loaded session), fallback computes
  // relative to the first entry's wall-clock, which gives correct relative order
  // but not absolute MP3 positions — those entries will be skipped from sync.
  let recBaseSec = null;
  if(_recStartWallMs){
    const d = new Date(_recStartWallMs);
    recBaseSec = d.getHours()*3600 + d.getMinutes()*60 + d.getSeconds()
                 + d.getMilliseconds()/1000;
  }

  document.querySelectorAll('.ent:not(.live)').forEach(el=>{
    // PRIMARY: server computed frame-accurate offset stored on the element
    if(el.dataset.mp3Offset !== undefined && el.dataset.mp3Offset !== ''){
      _entryTimes.push({el, sec: parseFloat(el.dataset.mp3Offset)});
      return;
    }
    // FALLBACK: only when mp3_offset_s absent AND we have a valid recording base
    // (skip fallback if _recStartWallMs is null — loaded sessions without offset
    //  cannot be reliably mapped to MP3 positions)
    if(recBaseSec === null) return;
    const tsEl = el.querySelector('.ets');
    if(!tsEl) return;
    const ts = tsEl.textContent.trim();
    const parts = ts.split(':').map(Number);
    if(parts.length!==3) return;
    const wallSec = parts[0]*3600 + parts[1]*60 + parts[2];
    _entryTimes.push({el, wallSec});
  });

  if(_entryTimes.length===0) return;

  // Resolve any fallback entries that still need wall-clock math
  if(recBaseSec !== null){
    const base = recBaseSec;
    _entryTimes.forEach(e=>{
      if(e.sec === undefined) e.sec = Math.max(0, e.wallSec - base);
    });
  }

  _entryTimes.sort((a,b)=>a.sec-b.sec);
}

function _playerUpdate(){
  if(!_audio||playerSeeking) return;
  const cur=_audio.currentTime, dur=_audio.duration||0;
  const seek=_el('PBAR_SEEK'), timeEl=_el('PBAR_TIME');
  if(seek) seek.value=dur?(cur/dur*100):0;
  if(timeEl) timeEl.textContent=_fmt(cur)+' / '+_fmt(dur);
  if(followMode) _syncSubtitle(cur);
}
function _fmt(s){ s=Math.floor(s||0); const m=Math.floor(s/60),ss=s%60; return m+':'+(ss<10?'0':'')+ss; }

function _syncSubtitle(cur){
  let active=null;
  for(const e of _entryTimes){ if(e.sec<=cur) active=e; else break; }
  const newEl=active?active.el:null;
  if(newEl===_activeEntry) return;
  if(_activeEntry) _activeEntry.classList.remove('playing');
  _activeEntry=newEl;
  if(_activeEntry){
    _activeEntry.classList.add('playing');
    // Use 'center' so the active entry is always fully in view, not just "nearest"
    _activeEntry.scrollIntoView({block:'center', behavior:'smooth'});
  }
}
function seekToEntry(el){
  if(!_audio || el.dataset.mp3Offset === undefined) return;
  const offset = parseFloat(el.dataset.mp3Offset);
  if(isNaN(offset)) return;
  // Seek audio to this subtitle's start position
  _audio.currentTime = offset;
  // If paused, start playing
  if(_audio.paused){
    _audio.play();
    _el('PBAR_BTN').textContent = '⏸';
  }
  // Highlight this entry immediately without waiting for timeupdate
  if(_activeEntry && _activeEntry !== el) _activeEntry.classList.remove('playing');
  _activeEntry = el;
  el.classList.add('playing');
}

function playerToggle(){
  if(!_audio) return;
  if(_audio.paused){ _audio.play(); _el('PBAR_BTN').textContent='⏸'; }
  else { _audio.pause(); _el('PBAR_BTN').textContent='▶'; }
}
function playerSeek(val){
  if(!_audio) return;
  _audio.currentTime=(_audio.duration||0)*val/100;
}

const WB=_el('WB');
const wcs=[];
for(let i=0;i<76;i++){const d=document.createElement('div');d.className='wc';d.style.height='3px';WB.insertBefore(d,WB.lastElementChild);wcs.push(d);}
let waveOn=false;
function waveLoop(){
  if(!waveOn){wcs.forEach(c=>c.style.height='3px');return;}
  wcs.forEach((c,i)=>{
    const h=2+Math.random()*30*(0.3+0.7*Math.abs(Math.sin(Date.now()/500+i*.33)));
    c.style.height=h+'px';
  });
  setTimeout(waveLoop,65);
}

// ── Subtitle entries ──────────────────────────────────────
const LANG_MAP={chinese:'zh',english:'en',japanese:'ja',korean:'ko',french:'fr',german:'de',spanish:'es',
                zh:'zh',en:'en',ja:'ja',ko:'ko',fr:'fr',de:'de',es:'es'};
function lc(lang){ return LANG_MAP[(lang||'').toLowerCase()]||'en'; }

const TRANS_TO_CODE={
  English:'en',Japanese:'ja',Korean:'ko',French:'fr',German:'de',Spanish:'es',Chinese:'zh',
  英文:'en',日文:'ja',韩文:'ko',法文:'fr',德文:'de',西班牙文:'es',中文:'zh',
};
function tc(n){ return TRANS_TO_CODE[n]||'en'; }

const LANG_COLOR={zh:'--cl-zh',en:'--cl-en',ja:'--cl-ja',ko:'--cl-ko',fr:'--cl-fr',de:'--cl-de',es:'--cl-es'};
function langColor(code){ return `var(${LANG_COLOR[code]||'--cl-en'})`; }

function addEntry(e){
  const h=_el('HINT'); if(h) h.remove();
  const cls=lc(e.language);
  const div=document.createElement('div');
  div.className=`ent ${cls}`;
  div.dataset.id=e.id;
  div.onclick = () => seekToEntry(div);
  div.dataset.raw=(e.corrected||'').toLowerCase()+' '+Object.values(e.translations||{}).join(' ').toLowerCase();
  // Store the server-computed MP3 offset directly on the element
  if(e.mp3_offset_s != null) div.dataset.mp3Offset = e.mp3_offset_s;

  const origCode=lc(e.language);
  const transHtml=Object.entries(e.translations||{}).map(([ln,tx])=>{
    const code=tc(ln);
    if(code===origCode) return '';
    const col=langColor(code);
    // Display name uses i18n langName map
    const label = TL(code);
    const safeQ=escHtml(tx).replace(/"/g,'&quot;');
    return `<div class="trow"><span class="tlbl" style="color:${col}">${label}</span><span class="tt" data-plain="${safeQ}" style="color:${col};opacity:.85">${escHtml(tx)}</span></div>`;
  }).join('');

  div.innerHTML=`
    <div class="eHead">
      <span class="badge ${cls}">${TL(cls)}</span>
      <span class="ets">${e.timestamp}</span>
      <span class="elat">ASR ${e.asr_ms}ms · LLM ${e.llm_ms}ms</span>
      <button class="edit-btn" title="${T('titleEditOrig')}" onclick="toggleEditOrig(event,'${e.id}')">${T('btnEditOrig')}</button>
    </div>
    <div class="orig" id="orig-${e.id}" data-plain="${escHtml(e.corrected).replace(/"/g,'&quot;')}">${escHtml(e.corrected)}</div>
    ${transHtml?`<div class="tblock">${transHtml}</div>`:''}
  `;
  SC.appendChild(div);
  sentCnt++; charCnt+=(e.corrected||'').length;
  _markUnsaved();
  MC.textContent=sentCnt; MCH.textContent=charCnt;
  if(autoScroll) scrollBot();

  // Incrementally keep _entryTimes in sync so late-arriving entries
  // (ASR/LLM still in flight when stop/pause was pressed) are included.
  if(e.mp3_offset_s != null){
    const sec = parseFloat(e.mp3_offset_s);
    // Insert in sorted order
    const idx = _entryTimes.findIndex(t => t.sec > sec);
    const item = {el: div, sec};
    if(idx === -1) _entryTimes.push(item);
    else _entryTimes.splice(idx, 0, item);
  }
}

// ── 应用后端返回的 entry_updated（重翻译结果）───────────────
function applyEntryUpdate(m){
  const id   = m.id;
  const card = document.querySelector(`.ent[data-id="${id}"]`);
  if(!card) return;

  // 更新原文
  const origEl = _el('orig-' + id);
  if(origEl && origEl.tagName !== 'TEXTAREA'){
    origEl.textContent   = m.corrected;
    origEl.dataset.plain = m.corrected.toLowerCase();
  }

  // 更新语言徽标
  const cls    = lc(m.language);
  const badge  = card.querySelector('.badge');
  if(badge){
    badge.className = `badge ${cls}`;
    badge.textContent = TL(cls);
  }
  // 更新卡片语言边框色
  card.className = `ent ${cls}`;

  // 重建翻译区
  const tmap   = (G.settings && G.settings.translate_map) || {};
  const revMap = {};
  Object.entries(tmap).forEach(([cn,en]) => { revMap[en] = cn; });

  const transEntries = Object.entries(m.translations || {});
  let transHtml = '';
  transEntries.forEach(([ln, tx]) => {
    const code = tc(ln);
    if(code === cls) return; // 跳过与原文同语言
    const col   = langColor(code);
    const label = TL(code);
    const safeQ = escHtml(tx).replace(/"/g, '&quot;');
    transHtml += `<div class="trow"><span class="tlbl" style="color:${col}">${label}</span><span class="tt" data-plain="${safeQ}" style="color:${col};opacity:.85">${escHtml(tx)}</span></div>`;
  });

  let tblock = card.querySelector('.tblock');
  if(transHtml){
    if(!tblock){
      tblock = document.createElement('div');
      tblock.className = 'tblock';
      card.appendChild(tblock);
    }
    tblock.style.opacity = '1';
    tblock.innerHTML = transHtml;
  } else if(tblock){
    tblock.remove();
  }

  // 同步搜索索引
  card.dataset.raw = m.corrected.toLowerCase() + ' ' +
    Object.values(m.translations || {}).join(' ').toLowerCase();
}

function highlightText(text,q){
  if(!q) return escHtml(text);
  const escaped=escHtml(text);
  const escapedQ=escHtml(q).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return escaped.replace(new RegExp(escapedQ,'gi'),m=>`<mark class="hl">${m}</mark>`);
}
function clearSearch(){ _el('SB').value=''; searchEntries(''); }
function searchEntries(q){
  const clrBtn=_el('SBCLR'); if(clrBtn) clrBtn.style.display=q?'block':'none';
  autoScroll=!q;
  const qL=q.toLowerCase();
  document.querySelectorAll('.ent:not(.live)').forEach(el=>{
    const raw=el.dataset.raw||'';
    const matches=!q||raw.includes(qL);
    el.style.display=matches?'':'none';
    if(!matches) return;
    const origEl=el.querySelector('.orig');
    if(origEl&&origEl.dataset.plain!==undefined){
      origEl.innerHTML=q?highlightText(origEl.dataset.plain,q):escHtml(origEl.dataset.plain);
    }
    el.querySelectorAll('.tt[data-plain]').forEach(ttEl=>{
      ttEl.innerHTML=q?highlightText(ttEl.dataset.plain,q):escHtml(ttEl.dataset.plain);
    });
  });
}

// ── 编辑原文：进入 / 退出编辑状态 ─────────────────────────
function startEditOrig(id){
  const origEl = _el('orig-' + id);
  const card   = origEl ? origEl.closest('.ent') : null;
  if(!origEl || !card) return;
  if(origEl.tagName === 'TEXTAREA') return; // 已在编辑

  const cur = origEl.textContent;
  const ta  = document.createElement('textarea');
  ta.className = 'orig-edit';
  ta.id        = 'orig-' + id;
  ta.value     = cur;
  ta.rows      = Math.max(2, Math.ceil(cur.length / 40));
  origEl.replaceWith(ta);
  ta.focus();
  ta.setSelectionRange(ta.value.length, ta.value.length);

  // 替换编辑按钮 → 保存 + 翻译
  const editBtn = card.querySelector('.edit-btn');
  if(editBtn){
    const savBtn = document.createElement('button');
    savBtn.className = 'edit-btn edit-btn-save';
    savBtn.textContent = T('btnSaveOrig');
    savBtn.onclick = (ev) => { ev.stopPropagation(); commitEditOrig(id, false); };

    const trnBtn = document.createElement('button');
    trnBtn.className = 'edit-btn edit-btn-translate';
    trnBtn.textContent = T('btnTranslateOrig');
    trnBtn.onclick = (ev) => { ev.stopPropagation(); commitEditOrig(id, true); };

    editBtn.replaceWith(savBtn);
    savBtn.insertAdjacentElement('afterend', trnBtn);
  }

  // Escape 取消
  ta.addEventListener('keydown', ev => {
    if(ev.key === 'Escape'){ ev.stopPropagation(); cancelEditOrig(id, cur); }
  });
}

function cancelEditOrig(id, originalText){
  const ta   = _el('orig-' + id);
  const card = ta ? ta.closest('.ent') : null;
  if(!ta || !card) return;

  const div = document.createElement('div');
  div.className       = 'orig';
  div.id              = 'orig-' + id;
  div.dataset.plain   = originalText.toLowerCase();
  div.textContent     = originalText;
  ta.replaceWith(div);
  _restoreEditBtn(card, id);
}

function commitEditOrig(id, doTranslate){
  const ta   = _el('orig-' + id);
  const card = ta ? ta.closest('.ent') : null;
  if(!ta || !card) return;

  const newText = ta.value.trim();

  // 用新文本替换 textarea → div.orig
  const div = document.createElement('div');
  div.className     = 'orig';
  div.id            = 'orig-' + id;
  div.dataset.plain = newText.toLowerCase();
  div.textContent   = newText;
  ta.replaceWith(div);

  // 恢复编辑按钮
  _restoreEditBtn(card, id);

  // 同步搜索索引
  const tblock   = card.querySelector('.tblock');
  const transText = tblock ? tblock.innerText.toLowerCase() : '';
  card.dataset.raw = newText.toLowerCase() + ' ' + transText;

  if(doTranslate){
    // 显示翻译中状态
    const tblockEl = card.querySelector('.tblock');
    if(tblockEl) tblockEl.style.opacity = '0.4';
    // 发给后端重新翻译
    send({ action: 'retranslate', id: String(id), text: newText });
  }
}

function _restoreEditBtn(card, id){
  // 移除保存/翻译按钮，恢复编辑按钮
  card.querySelectorAll('.edit-btn-save,.edit-btn-translate').forEach(b => b.remove());
  const eHead = card.querySelector('.eHead');
  if(eHead && !eHead.querySelector('.edit-btn')){
    const btn = document.createElement('button');
    btn.className = 'edit-btn';
    btn.title     = T('titleEditOrig');
    btn.textContent = T('btnEditOrig');
    btn.onclick = (ev) => { ev.stopPropagation(); startEditOrig(id); };
    eHead.appendChild(btn);
  }
}

// 保持旧入口兼容（addEntry 里 onclick 调用此）
function toggleEditOrig(evt, id){
  evt.stopPropagation();
  startEditOrig(id);
}

let _dlQueue=[], _currentDlRepo=null;

function showDownloadGuide(models){
  const ov=_el('DL_OVERLAY');
  const entries=Object.entries(models);
  if(entries.every(([,v])=>v.cached)){ ov.style.display='none'; return; }

  let modelHTML=entries.map(([repo,info])=>{
    if(info.cached) return `<div class="dl-model"><div class="dl-model-head"><span class="dl-model-name">${info.label}</span><span class="dl-model-size">${info.size}</span></div><div class="dl-cached">${T('dlCached')}</div></div>`;
    const safeId=repo.replace(/[^a-zA-Z0-9]/g,'_');
    return `<div class="dl-model" id="dlm_${safeId}"><div class="dl-model-head"><span class="dl-model-name">${info.label}</span><span class="dl-model-size">${info.size}</span></div><div class="dl-model-desc">${info.desc}</div><div class="dl-status" id="dls_${safeId}">${T('dlWaiting')}</div><div class="dl-progress" id="dlp_${safeId}"><div class="dl-progress-bar" id="dlb_${safeId}"></div></div></div>`;
  }).join('');

  const missingRepos=JSON.stringify(entries.filter(([,v])=>!v.cached).map(([r])=>r));
  ov.innerHTML=`<div class="dl-box"><div class="dl-head"><div class="dl-title">${T('dlTitle')}</div><div class="dl-sub">${T('dlSub')}</div></div><div class="dl-body">${modelHTML}</div><div class="dl-foot"><button class="dl-btn dl-btn-skip" onclick="skipDownload()">${T('dlSkip')}</button><button class="dl-btn dl-btn-primary" id="DL_START_BTN" onclick="startDownloads(${missingRepos})">${T('dlStart')}</button></div></div>`;
  ov.style.display='flex';
}

async function startDownloads(repos){
  _el('DL_START_BTN').disabled=true;
  _el('DL_START_BTN').textContent=T('dlStarting');
  _dlQueue=[...repos];
  processDownloadQueue();
}

async function processDownloadQueue(){
  if(_dlQueue.length===0){
    _el('DL_START_BTN').textContent=T('dlAllDone');
    _el('DL_START_BTN').disabled=false;
    _el('DL_START_BTN').onclick=()=>{ _el('DL_OVERLAY').style.display='none'; };
    return;
  }
  const repo=_dlQueue.shift();
  const safeId=repo.replace(/[^a-zA-Z0-9]/g,'_');
  const statusEl=_el('dls_'+safeId), progEl=_el('dlp_'+safeId);
  if(statusEl){ statusEl.textContent=T('dlDownloading'); statusEl.className='dl-status'; }
  if(progEl) progEl.style.display='block';
  _currentDlRepo=repo;
  await fetch('/api/download/'+repo,{method:'POST'});
}

function handleDlMsg(m){
  const repo=m.repo||'', safeId=repo.replace(/[^a-zA-Z0-9]/g,'_');
  const statusEl=_el('dls_'+safeId), barEl=_el('dlb_'+safeId);
  if(m.type==='dl_start'){
    if(statusEl) statusEl.textContent=T('dlConnecting');
  } else if(m.type==='dl_progress'){
    if(statusEl){ statusEl.textContent=m.line||''; statusEl.className='dl-status'; }
    if(barEl){ const cur=parseFloat(barEl.style.width)||0; barEl.style.width=Math.min(cur+0.3,95)+'%'; }
  } else if(m.type==='dl_done'){
    if(m.success){
      if(statusEl){ statusEl.textContent=T('dlDone'); statusEl.className='dl-status ok'; }
      if(barEl) barEl.style.width='100%';
    } else {
      if(statusEl){ statusEl.textContent=T('dlFailed'); statusEl.className='dl-status err'; }
    }
    setTimeout(processDownloadQueue,500);
  } else if(m.type==='dl_error'){
    if(statusEl){ statusEl.textContent=T('dlError').replace('{msg}',m.msg||T('dlFailed')); statusEl.className='dl-status err'; }
    setTimeout(processDownloadQueue,500);
  }
}

function skipDownload(){ _el('DL_OVERLAY').style.display='none'; }

// ── Boot ──────────────────────────────────────────────────
applyUILang();   // render all strings before anything else
connect();

(async function checkModels(){
  try {
    const res=await fetch('/api/check_models');
    const models=await res.json();
    if(Object.entries(models).some(([,v])=>!v.cached)) showDownloadGuide(models);
  } catch(e){}
})();
</script>
